# ── Core ADC ─────────────────────────────────────────────────────────────────
CONFIG_ADC=y

# ── Serial console (USART1, 115200 8N1 on NUCLEO-N657X0-Q) ───────────────────
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# ── Heap / stack sizes (defaults are fine for this sample) ───────────────────
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_ADC_LOG_LEVEL_DBG=y
CONFIG_CBPRINTF_FP_SUPPORT=y